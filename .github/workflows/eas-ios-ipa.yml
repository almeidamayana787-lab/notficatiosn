# Build iOS (.ipa) na nuvem via EAS.
# Secret obrigatório: EXPO_TOKEN — https://expo.dev/accounts/[sua-conta]/settings/access-tokens
# Uma vez no clone: npx eas init (cria o projeto EAS e grava extra.eas.projectId no app.json).
# Assinatura Apple: configure em https://expo.dev (Credentials) ou eas credentials.
# O IPA gerado pela EAS já vem assinado; Sideloadly serve para instalar no iPhone se quiser fora da App Store.

name: EAS iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build iOS (wait, JSON)
        id: eas
        run: |
          set -euo pipefail
          eas build --platform ios --profile preview --non-interactive --wait --json > build.json
          jq . build.json
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Download IPA from EAS artifact URL
        run: |
          set -euo pipefail
          URL=$(jq -r '
            (if type == "array" then .[0] else . end)
            | .artifacts.applicationArchiveUrl // empty
          ' build.json)
          if [ -z "$URL" ] || [ "$URL" = "null" ]; then
            echo "::error::Não foi possível ler applicationArchiveUrl do build.json"
            exit 1
          fi
          echo "Downloading IPA..."
          curl -fsSL -o Nubank.ipa "$URL"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: nubank-ios-ipa
          path: ./Nubank.ipa
          if-no-files-found: error
