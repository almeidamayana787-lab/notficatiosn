# Roda a cada push na main — confirma que o GitHub Actions está ativo no repositório.
# (O build do .ipa continua no workflow "EAS iOS IPA", disparado manualmente.)

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit
