# Compila um .ipa SEM assinatura nos servidores do GitHub (runner macOS + Xcode).
# A assinatura fica a cargo do Sideloadly no seu PC (Apple ID).
# Não usa EAS, nem token da Expo, nem secrets Apple no repositório.

name: iOS IPA (GitHub macOS + Xcode)

on:
  workflow_dispatch:

jobs:
  build:
    # RN 0.81+ (Expo 54) exige Xcode >= 16.1; macos-14 ainda vinha com Xcode 15.x e falhava no pod install.
    runs-on: macos-15
    # Evita cortes por tempo em pod/xcodebuild pesados; "lost communication" costuma ser OOM/transiente.
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode (RN exige >= 16.1)
        run: xcodebuild -version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: npm ci
        run: npm ci

      - name: Expo prebuild (ios/)
        run: npx expo prebuild --platform ios --no-install

      - name: CocoaPods
        run: cd ios && pod install --repo-update

      - name: Listar schemes (debug)
        run: cd ios && xcodebuild -list

      - name: Build sem assinatura e empacotar .ipa (Sideloadly assina depois)
        id: pack
        run: |
          set -euo pipefail
          cd ios

          WORKSPACE="Nubank.xcworkspace"
          SCHEME="Nubank"
          if [ ! -d "$WORKSPACE" ]; then
            WORKSPACE=$(ls -1 *.xcworkspace 2>/dev/null | head -1)
            echo "Usando workspace: $WORKSPACE"
          fi

          UNSIGNED_FLAGS=(
            "CODE_SIGNING_ALLOWED=NO"
            "CODE_SIGNING_REQUIRED=NO"
            "CODE_SIGN_IDENTITY="
            "CODE_SIGN_STYLE=Manual"
            "DEVELOPMENT_TEAM="
            "PROVISIONING_PROFILE_SPECIFIER="
          )

          pack_app_to_ipa() {
            local APP_PATH="$1"
            if [ ! -d "$APP_PATH" ]; then
              echo "::error::.app não encontrado: $APP_PATH"
              return 1
            fi
            echo "Empacotando: $APP_PATH"
            rm -rf "$GITHUB_WORKSPACE/Payload" "$GITHUB_WORKSPACE/Nubank.ipa" || true
            mkdir -p "$GITHUB_WORKSPACE/Payload"
            cp -R "$APP_PATH" "$GITHUB_WORKSPACE/Payload/"
            cd "$GITHUB_WORKSPACE"
            zip -q -r Nubank.ipa Payload
            rm -rf Payload
            ls -la Nubank.ipa
          }

          set +e
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$PWD/build/Nubank.xcarchive" \
            -destination 'generic/platform=iOS' \
            -jobs 2 \
            -parallelizeTargets NO \
            archive \
            "${UNSIGNED_FLAGS[@]}" 2> /tmp/archive.log
          ARCHIVE_OK=$?
          set -e

          if [ "$ARCHIVE_OK" -eq 0 ]; then
            APP=$(find "$PWD/build/Nubank.xcarchive/Products/Applications" -maxdepth 1 -name "*.app" 2>/dev/null | head -1)
            if [ -n "${APP:-}" ]; then
              pack_app_to_ipa "$APP"
              exit 0
            fi
          fi
          echo "Archive unsigned falhou ou .app ausente; tentando build direto (log em /tmp/archive.log)"
          tail -80 /tmp/archive.log || true

          rm -rf "$PWD/build-dd"
          set +e
          xcodebuild -workspace "$WORKSPACE" -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$PWD/build-dd" \
            -jobs 2 \
            -parallelizeTargets NO \
            build \
            "${UNSIGNED_FLAGS[@]}" 2> /tmp/build.log
          BUILD_OK=$?
          set -e

          if [ "$BUILD_OK" -ne 0 ]; then
            echo "::warning::Build direto retornou código $BUILD_OK; procurando .app mesmo assim"
            tail -80 /tmp/build.log || true
          fi

          APP=$(find "$PWD/build-dd" -name "Nubank.app" 2>/dev/null | head -1)
          if [ -z "${APP:-}" ]; then
            APP=$(find "$PWD/build-dd" -name "*.app" -path "*/Release-iphoneos/*" 2>/dev/null | head -1)
          fi
          if [ -z "${APP:-}" ]; then
            APP=$(find "$PWD/build-dd" -name "*.app" 2>/dev/null | head -1)
          fi

          if [ -z "${APP:-}" ]; then
            echo "::error::Não foi possível gerar Nubank.app sem assinatura neste Xcode."
            echo "Anexe os logs: archive.log e build.log no issue."
            cat /tmp/archive.log /tmp/build.log > "$GITHUB_WORKSPACE/build-failure-logs.txt" || true
            exit 1
          fi

          pack_app_to_ipa "$APP"

      - name: Upload logs (apenas se falhou)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: build-failure-logs.txt
          if-no-files-found: ignore

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: nubank-ios-ipa
          path: Nubank.ipa
          if-no-files-found: error
